# WebSocket / Upgrade header
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Upstream backend (admin/api service)
upstream domiai_api {
  server 127.0.0.1:13000;
  keepalive 64;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name dimiai.cn www.dimiai.cn;

  # Astro static build output directory
  root /opt/domiai/www/;
  index index.html;

  gzip on;
  gzip_comp_level 5;

  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
  gzip_vary on;

  # ===== Security headers =====
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # ===== API / Admin proxy (do not cache) =====
  location ^~ /admin/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_pass http://domiai_api;
  }

  location ^~ /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_pass http://domiai_api;
  }

  # ===== Immutable build assets =====
  location ^~ /_astro/ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ===== Static files in /public copied to root =====
  location ~* \.(?:css|js|mjs|json|txt|xml|ico|svg|png|jpe?g|gif|webp|avif|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # ===== Robots / sitemap =====
  location = /robots.txt { try_files $uri =404; }
  location = /sitemap.xml { try_files $uri =404; }
  location = /sitemap-index.xml { try_files $uri =404; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
