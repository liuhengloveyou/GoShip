server {
    listen 80;
    server_name www.aidomi.net aidomi.net;

    access_log /opt/nginx/logs/aidomi.net.access.log;
    error_log /opt/nginx/logs/aidomi.net.error.log warn;

    # Astro static output directory
    root /opt/www.aidomi.net/site/dist/;
    index index.html;

    # Basic gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Long cache for fingerprinted/static assets
    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|avif|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # HTML should be revalidated to avoid stale pages after publish.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

  
    # Reverse proxy for GoPress backend APIs
    location ^~ /api/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin UI is served by GoPress under /_admin/
    location ^~ /_admin/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_admin {
        return 307 /_admin/;
    }

    # Optional probes
    location = /healthz {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://127.0.0.1:10001;
        proxy_set_header Host $host;
    }

    # Static site pages/assets
    location / {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

}
